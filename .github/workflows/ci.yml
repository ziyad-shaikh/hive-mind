name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type-check & compile
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Package extension (.vsix)
        run: npx --yes @vscode/vsce package --allow-missing-repository

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: hive-mind-vsix
          path: '*.vsix'
          if-no-files-found: error
          retention-days: 14
